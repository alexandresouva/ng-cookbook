name: Automated PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - '*.json'
      - '*.mjs'
      - '.github/workflows/**'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      models: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run PR Reviewer Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/pr_reviewer.py
